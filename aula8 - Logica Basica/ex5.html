<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 5</title>
</head>
<body>
    <script>
        let n = parseFloat(prompt("Digite um numero: "))
        if (n % 2 == 0){
            document.write("O numero é par")
        } else {
            document.write("O numero é impar")
        }
    </script>
</body>
